name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    if: ${{ false }}
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: http://127.0.0.1:54321
      VITE_SUPABASE_ANON_KEY: sb_test_key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm
        run: npm i -g npm@10.9.2 && npm --version

      - name: Install dependencies
        run: npm ci

      - name: CI gate
        run: npm run ci:gate

  semgrep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (JS/TS)
        run: semgrep --config p/javascript --config p/typescript --error --metrics=off

  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    if: ${{ false }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm
        run: npm i -g npm@10.9.2 && npm --version

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high
